services:
  postgres-metastore:
    image: postgres:13
    container_name: postgres-metastore
    environment:
      POSTGRES_DB: ${HIVE_POSTGRES_DB:-metastore_db}
      POSTGRES_USER: ${HIVE_POSTGRES_USER:-hive}
      POSTGRES_PASSWORD: ${HIVE_POSTGRES_PASSWORD:-hive123}
    volumes:
      - postgres-metastore-volume:/var/lib/postgresql/data
    ports:
      - "5433:5432"            
    restart: always

  metastore:
    build: 
      context: ./config/hive-metastore
    hostname: metastore
    container_name: metastore
    env_file:
      - .env
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      DB_URL: jdbc:postgresql://postgres-metastore:5432/${HIVE_POSTGRES_DB:-metastore_db}
      DB_USER: ${HIVE_POSTGRES_USER:-hive}
      DB_PASS: ${HIVE_POSTGRES_PASSWORD:-hive123}
      METASTORE_DB_TYPE: postgres
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-admin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-admin12345}
      SERVICE_OPTS: >-
        -Xmx1G
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://postgres-metastore:5432/${HIVE_POSTGRES_DB:-metastore_db}
        -Djavax.jdo.option.ConnectionUserName=${HIVE_POSTGRES_USER:-hive}
        -Djavax.jdo.option.ConnectionPassword=${HIVE_POSTGRES_PASSWORD:-hive123}
        -Dmetastore.warehouse.dir=s3a://lakehouse/
    depends_on:
      - postgres-metastore
    ports:
      - "9083:9083"    # Hive Metastore Thrift
    restart: always

    minio-nginx:
      image: nginx:alpine
      container_name: minio-nginx
      ports:
        - "443:443"
        - "80:80"
      volumes:
        - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
        # - ssl
      depends_on:
        - minio-1
        - metastore
      restart: unless-stopped
      healthcheck:
        test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
        interval: 30s
        timeout: 10s
        retries: 3

volumes:
  postgres-metastore-volume: