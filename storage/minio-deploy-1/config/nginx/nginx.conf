events {
    worker_connections 10240;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Hỗ trợ WebSocket cho MinIO Console
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Định nghĩa Backend (đổi tên cho khớp với cấu hình server bên dưới)
    upstream minio_s3_backend {
        server minio-1:9000;
        server minio-2:9000;
        server minio-3:9000;
    }

    upstream minio_console_backend {
        server minio-1:9001;
        server minio-2:9001;
        server minio-3:9001;
    }

    # --- MinIO S3 API (Port 9000) ---
    server {
        listen 9000;
        server_name _;

        ignore_invalid_headers off;
        client_max_body_size 0;
        proxy_buffering off;
        proxy_request_buffering off;

        location / {
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-NginX-Proxy true;

            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            chunked_transfer_encoding off;

            proxy_pass http://minio_s3_backend;
        }
    }

    # --- MinIO Console UI (Port 9001) ---
    server {
        listen 9001;
        server_name _;

        ignore_invalid_headers off;
        client_max_body_size 0;
        proxy_buffering off;
        proxy_request_buffering off;

        location / {
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support cho Console
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;

            proxy_pass http://minio_console_backend;
        }
    }

    # Health check port cho Docker (nếu cần)
    server {
        listen 8080;
        location /health {
            return 200 'ok';
        }
    }
}