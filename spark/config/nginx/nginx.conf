server {
    listen 443 ssl;
    server_name ${DOMAIN};

    # ssl_certificate /etc/nginx/certs/fullchain.pem;
    # ssl_certificate_key /etc/nginx/certs/privkey.pem;

    location /spark/ {
        proxy_pass http://spark-master:8080/;
        proxy_set_header Host $host;
    }

    location /history/ {
        proxy_pass http://spark-history-server:18080/;
        proxy_set_header Host $host;
    }
}